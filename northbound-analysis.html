<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>北向资金分析</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #0d1117;
            min-height: 100vh;
            padding: 20px;
            color: #c9d1d9;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: #161b22;
            border-radius: 12px;
            border: 1px solid #30363d;
            padding: 30px;
        }
        .header {
            text-align: center;
            padding: 15px 0 20px;
            border-bottom: 1px solid #30363d;
            margin-bottom: 25px;
        }
        .header h1 {
            font-size: 26px;
            font-weight: 600;
            color: #58a6ff;
            margin-bottom: 6px;
        }
        .header .subtitle {
            color: #8b949e;
            font-size: 13px;
        }
        .breadcrumb {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 12px;
            font-size: 13px;
            color: #8b949e;
        }
        .breadcrumb a {
            color: #58a6ff;
            text-decoration: none;
        }
        .breadcrumb a:hover {
            text-decoration: underline;
        }
        .breadcrumb .current {
            color: #58a6ff;
            font-weight: 600;
        }
        .update-time {
            text-align: center;
            color: #6e7681;
            font-size: 12px;
            margin-bottom: 25px;
        }
        .section {
            margin-bottom: 30px;
        }
        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #f0f6fc;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-sub {
            font-size: 12px;
            font-weight: normal;
            color: #6e7681;
            margin-left: 8px;
        }

        /* 周期切换 */
        .period-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }
        .period-label {
            font-size: 13px;
            color: #8b949e;
        }
        .period-btn {
            background: #21262d;
            border: 1px solid #30363d;
            color: #8b949e;
            padding: 5px 14px;
            font-size: 13px;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
            font-family: inherit;
        }
        .period-btn:hover {
            background: #30363d;
            color: #c9d1d9;
        }
        .period-btn.active {
            background: rgba(88, 166, 255, 0.15);
            border-color: #58a6ff;
            color: #58a6ff;
            font-weight: 500;
        }

        /* 行业板块 */
        .industry-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }
        .industry-box {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 14px 16px;
        }
        .industry-box-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
            color: #58a6ff;
        }
        .industry-item {
            display: flex;
            align-items: center;
            padding: 5px 0;
            font-size: 13px;
            border-bottom: 1px solid #21262d;
        }
        .industry-item:last-child { border-bottom: none; }
        .industry-name {
            width: 110px;
            flex-shrink: 0;
            color: #c9d1d9;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .industry-bar {
            flex: 1;
            height: 18px;
            background: #21262d;
            border-radius: 3px;
            margin: 0 8px;
            position: relative;
            overflow: hidden;
        }
        .industry-bar-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.3s;
        }
        .industry-bar-fill.buy { background: linear-gradient(90deg, #58a6ff, #1f6feb); }
        .industry-bar-fill.sell { background: linear-gradient(90deg, #238636, #2ea043); }
        .industry-amount {
            width: 80px;
            text-align: right;
            flex-shrink: 0;
            font-size: 12px;
        }
        .up { color: #f85149; }
        .down { color: #3fb950; }
        .empty {
            color: #6e7681;
            font-size: 13px;
            padding: 10px 0;
            text-align: center;
        }

        /* 排名表格 */
        .rank-table-wrap {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            overflow: hidden;
        }
        .rank-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .rank-table th {
            background: #161b22;
            color: #8b949e;
            font-weight: 500;
            font-size: 12px;
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid #30363d;
        }
        .rank-table td {
            padding: 10px 12px;
            border-bottom: 1px solid #21262d;
            color: #c9d1d9;
        }
        .rank-table tr:last-child td {
            border-bottom: none;
        }
        .rank-table tr:hover td {
            background: #161b22;
        }
        .rank-num {
            display: inline-block;
            width: 24px;
            height: 24px;
            line-height: 24px;
            text-align: center;
            border-radius: 50%;
            background: #21262d;
            color: #8b949e;
            font-size: 12px;
            font-weight: 600;
        }
        .rank-num.top1 { background: linear-gradient(135deg, #f0b429, #d4a017); color: #0d1117; }
        .rank-num.top2 { background: linear-gradient(135deg, #a0aec0, #718096); color: #0d1117; }
        .rank-num.top3 { background: linear-gradient(135deg, #c05621, #9c4221); color: #0d1117; }
        .stock-code {
            color: #6e7681;
            font-size: 11px;
            margin-left: 4px;
            font-weight: normal;
        }

        /* 双栏表格区域 */
        .dual-table-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }
        .dual-table-box {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            overflow: hidden;
        }
        .dual-table-title {
            padding: 12px 16px;
            font-size: 14px;
            font-weight: 600;
            color: #f0f6fc;
            border-bottom: 1px solid #21262d;
        }
        .dual-table-title.buy { color: #58a6ff; }
        .dual-table-title.sell { color: #3fb950; }
        .dual-table-box .rank-table {
            font-size: 12px;
        }
        .dual-table-box .rank-table th,
        .dual-table-box .rank-table td {
            padding: 8px 12px;
        }

        /* 热度指数 */
        .heat-index-wrap {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 20px;
        }
        .heat-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 20px;
        }
        .heat-stat-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 16px;
            text-align: center;
        }
        .heat-stat-label {
            font-size: 12px;
            color: #8b949e;
            margin-bottom: 8px;
        }
        .heat-stat-value {
            font-size: 22px;
            font-weight: 600;
            color: #f0f6fc;
        }
        .heat-stat-value.up { color: #58a6ff; }
        .heat-stat-value.down { color: #3fb950; }
        .heat-daily-list {
            max-height: 300px;
            overflow-y: auto;
        }
        .heat-daily-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #21262d;
            font-size: 13px;
        }
        .heat-daily-item:last-child {
            border-bottom: none;
        }
        .heat-daily-date {
            color: #8b949e;
            width: 100px;
            flex-shrink: 0;
        }
        .heat-daily-metrics {
            display: flex;
            gap: 20px;
            flex: 1;
            justify-content: flex-end;
        }
        .heat-daily-metrics span {
            font-size: 12px;
            min-width: 90px;
            text-align: right;
        }

        /* 滚动条 */
        .heat-daily-list::-webkit-scrollbar {
            width: 6px;
        }
        .heat-daily-list::-webkit-scrollbar-track {
            background: #161b22;
        }
        .heat-daily-list::-webkit-scrollbar-thumb {
            background: #30363d;
            border-radius: 3px;
        }

        @media (max-width: 768px) {
            .industry-grid, .dual-table-grid {
                grid-template-columns: 1fr;
            }
            .container {
                padding: 15px;
            }
            body {
                padding: 10px;
            }
            .heat-stats {
                grid-template-columns: 1fr;
            }
            .rank-table th, .rank-table td {
                padding: 8px 10px;
                font-size: 12px;
            }
        }
    </style>
</head>

    var currentPeriod = 'week';

    function fmtAmount(wan) {
        if (wan === undefined || wan === null) return '--';
        var abs = Math.abs(wan);
        if (abs >= 10000) return (wan / 10000).toFixed(2) + '亿';
        return wan.toFixed(0) + '万';
    }

    function fmtPct(pct) {
        if (pct === undefined || pct === null) return '--';
        var s = pct.toFixed(2);
        if (pct > 0) return '+' + s + '%';
        return s + '%';
    }

    function pctClass(pct) {
        if (pct > 0) return 'up';
        if (pct < 0) return 'down';
        return '';
    }

    function getRankNumClass(i) {
        if (i === 0) return 'top1';
        if (i === 1) return 'top2';
        if (i === 2) return 'top3';
        return '';
    }

    // ========== 周期切换 ==========
    function switchPeriod(period) {
        currentPeriod = period;
        document.getElementById('period-week').classList.toggle('active', period === 'week');
        document.getElementById('period-month').classList.toggle('active', period === 'month');
        renderPage();
    }

    // ========== 渲染：行业配置趋势 ==========
    function renderIndustry() {
        var container = document.getElementById('nb-industry-grid');
        var data = nbAnalysis[currentPeriod] || {};
        var ind = data.industry_trend || {};
        var topBuy = ind.top_buy || [];
        var topSell = ind.top_sell || [];

        var maxBuy = 0;
        for (var i = 0; i < topBuy.length; i++) {
            if (topBuy[i].net_buy_wan > maxBuy) maxBuy = topBuy[i].net_buy_wan;
        }
        var maxSell = 0;
        for (var i = 0; i < topSell.length; i++) {
            if (topSell[i].net_sell_wan > maxSell) maxSell = topSell[i].net_sell_wan;
        }

        var html = '';
        // 净买入TOP行业
        html += '<div class="industry-box">';
        html += '<div class="industry-box-title">📈 净买入TOP行业</div>';
        if (!ind.has_industry_data) {
            html += '<div class="empty">行业数据接口接入中...</div>';
        } else if (topBuy.length === 0) {
            html += '<div class="empty">暂无数据</div>';
        } else {
            for (var i = 0; i < topBuy.length; i++) {
                var it = topBuy[i];
                var pct = maxBuy > 0 ? (it.net_buy_wan / maxBuy * 100) : 0;
                html += '<div class="industry-item">';
                html += '<div class="industry-name" title="' + it.industry + '">' + it.industry + '</div>';
                html += '<div class="industry-bar"><div class="industry-bar-fill buy" style="width:' + pct + '%;"></div></div>';
                html += '<div class="industry-amount up">+' + fmtAmount(it.net_buy_wan) + '</div>';
                html += '</div>';
            }
        }
        html += '</div>';

        // 净卖出TOP行业
        html += '<div class="industry-box">';
        html += '<div class="industry-box-title">📉 净卖出TOP行业</div>';
        if (!ind.has_industry_data) {
            html += '<div class="empty">行业数据接口接入中...</div>';
        } else if (topSell.length === 0) {
            html += '<div class="empty">暂无数据</div>';
        } else {
            for (var i = 0; i < topSell.length; i++) {
                var it = topSell[i];
                var pct = maxSell > 0 ? (it.net_sell_wan / maxSell * 100) : 0;
                html += '<div class="industry-item">';
                html += '<div class="industry-name" title="' + it.industry + '">' + it.industry + '</div>';
                html += '<div class="industry-bar"><div class="industry-bar-fill sell" style="width:' + pct + '%;"></div></div>';
                html += '<div class="industry-amount down">-' + fmtAmount(it.net_sell_wan) + '</div>';
                html += '</div>';
            }
        }
        html += '</div>';
        container.innerHTML = html;
    }

    // ========== 渲染：热度指数 ==========
    function renderHeatIndex() {
        var container = document.getElementById('nb-heat-index');
        var data = nbAnalysis[currentPeriod] || {};
        var heat = data.heat_index || {};
        var daily = heat.daily || [];
        var reversed = daily.slice().reverse();  // 最新在前

        var html = '';
        html += '<div class="heat-stats">';
        html += '<div class="heat-stat-card">';
        html += '<div class="heat-stat-label">日均上榜股票数</div>';
        html += '<div class="heat-stat-value">' + (heat.avg_stocks || 0) + ' 只</div>';
        html += '</div>';
        html += '<div class="heat-stat-card">';
        html += '<div class="heat-stat-label">日均北向净买卖</div>';
        var net = heat.avg_net_wan || 0;
        var cls = net > 0 ? 'up' : 'down';
        var sign = net > 0 ? '+' : '';
        html += '<div class="heat-stat-value ' + cls + '">' + sign + fmtAmount(net) + '</div>';
        html += '</div>';
        html += '<div class="heat-stat-card">';
        html += '<div class="heat-stat-label">累计交易日</div>';
        html += '<div class="heat-stat-value" style="color:#58a6ff;">' + daily.length + ' 天</div>';
        html += '</div>';
        html += '</div>';

        html += '<div style="font-size:13px;color:#8b949e;margin-bottom:10px;font-weight:500;">每日明细（最新在前）</div>';
        html += '<div class="heat-daily-list">';
        if (reversed.length === 0) {
            html += '<div class="empty">暂无数据</div>';
        } else {
            for (var i = 0; i < reversed.length; i++) {
                var d = reversed[i];
                var netAmt = d.total_net_wan || 0;
                html += '<div class="heat-daily-item">';
                html += '<div class="heat-daily-date">' + d.date + '</div>';
                html += '<div class="heat-daily-metrics">';
                html += '<span style="color:#c9d1d9;">上榜 ' + d.stock_count + ' 只</span>';
                html += '<span class="' + (netAmt > 0 ? 'up' : 'down') + '">' + (netAmt > 0 ? '+' : '') + '净买 ' + fmtAmount(netAmt) + '</span>';
                html += '<span style="color:#58a6ff;">买 ' + d.buy_count + ' / 卖 ' + d.sell_count + '</span>';
                html += '</div></div>';
            }
        }
        html += '</div>';
        container.innerHTML = html;
    }

    // ========== 渲染主函数 ==========
    function renderPage() {
        var data = nbAnalysis[currentPeriod];
        if (!data) {
            document.getElementById('update-time').textContent = '暂无数据';
            return;
        }
        renderIndustry();
        renderContinuousBuy();
        renderResonance();
        renderHoldingChange();
        renderHeatIndex();
    }

    // ========== 初始化 ==========
    function init() {
        var dates = Object.keys(nbDailyData || {}).sort();
        if (dates.length > 0) {
            var latest = dates[dates.length - 1];
            document.getElementById('update-time').textContent = '数据截至 ' + latest;
        }
        renderPage();
    }
    init();
