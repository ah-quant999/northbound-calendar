name: T+1早间兜底复核

# 触发方式：
#   - cron: 北京时间周二到周六早上7:30 = UTC周一到周五23:30
#     因为 T+1 早上跑的是 T 日（前一交易日）的兜底
#     周一早上跑的是上周五的 T 日（周六周日休市不用跑）
#   - workflow_dispatch: 手动触发，可指定 T 日日期
on:
  schedule:
    - cron: '30 23 * * 1-5'
  workflow_dispatch:
    inputs:
      date:
        description: 'T 日日期 (YYYY-MM-DD，留空则自动取北京时间昨日)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  t1-fallback:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: calendar-pages

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Configure git
        run: |
          git config user.email "afoxli@coze.email"
          git config user.name "afoxli"
          git config core.quotePath false

      - name: Run T+1 morning fallback and push (带冲突重试)
        run: |
          DATE_ARG=""
          if [ -n "${{ github.event.inputs.date }}" ]; then
            DATE_ARG="--date ${{ github.event.inputs.date }}"
          fi

          MAX_RETRIES=3
          RETRY=0
          while [ $RETRY -lt $MAX_RETRIES ]; do
            echo "=== 第 $((RETRY+1)) 次尝试 ==="

            # 拉取最新代码，确保从最新状态开始
            git fetch origin calendar-pages
            git reset --hard origin/calendar-pages

            # 执行兜底脚本
            python3 scripts/t1_morning_fallback.py \
              --repo-dir "." \
              $DATE_ARG \
              2>&1 | tee fallback_output.log

            # 检查是否有变更
            if ! grep -q "GHA_HAS_CHANGES=true" fallback_output.log; then
              TARGET_DATE=$(grep "GHA_TARGET_DATE=" fallback_output.log | tail -1 | sed 's/GHA_TARGET_DATE=//')
              echo "ℹ️  无数据变更（$TARGET_DATE 数据完整，无需补抓），跳过提交"
              exit 0
            fi

            TARGET_DATE=$(grep "GHA_TARGET_DATE=" fallback_output.log | tail -1 | sed 's/GHA_TARGET_DATE=//')
            echo "📅 目标日期: $TARGET_DATE"

            # 提交（git diff逐文件add，避开中文文件名编码问题）
            git diff --name-only | while read f; do git add "$f"; done
            git diff --cached --name-only | while read f; do echo "  变更文件: $f"; done
            git commit -m "auto: $TARGET_DATE T+1早间兜底补抓 (北向+机游)"

            # 推送
            if git push origin calendar-pages; then
              echo "✅ 已推送到 calendar-pages 分支"
              exit 0
            else
              echo "⚠️  推送失败，可能有并发冲突，准备重试..."
              git reset --hard HEAD~1
              RETRY=$((RETRY+1))
              sleep $((RETRY * 10))
            fi
          done

          echo "❌ 重试 $MAX_RETRIES 次后仍然失败"
          exit 1
