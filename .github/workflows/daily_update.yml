name: 机游共振日历每日更新

# 触发方式：
#   - cron: 北京时间 17:00 每个工作日 = UTC 09:00 周一到周五
#   - workflow_dispatch: 手动触发
on:
  schedule:
    - cron: '0 9 * * 1-5'
  workflow_dispatch:
    inputs:
      date:
        description: '目标日期 (YYYY-MM-DD，留空为今天)'
        required: false
        default: ''
      lookback:
        description: '回刷前N个交易日'
        required: false
        default: '2'

permissions:
  contents: write

jobs:
  update-calendar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: calendar-pages

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Configure git
        run: |
          git config user.email "afoxli@coze.email"
          git config user.name "afoxli"
          git config core.quotePath false

      - name: Run daily update and push (带冲突重试)
        run: |
          DATE_ARG=""
          if [ -n "${{ github.event.inputs.date }}" ]; then
            DATE_ARG="--date ${{ github.event.inputs.date }}"
          fi
          LOOKBACK_ARG="--lookback 2"
          if [ -n "${{ github.event.inputs.lookback }}" ]; then
            LOOKBACK_ARG="--lookback ${{ github.event.inputs.lookback }}"
          fi

          MAX_RETRIES=3
          RETRY=0
          while [ $RETRY -lt $MAX_RETRIES ]; do
            echo "=== 第 $((RETRY+1)) 次尝试 ==="

            # 拉取最新代码，确保从最新状态开始
            git fetch origin calendar-pages
            git reset --hard origin/calendar-pages

            # 执行更新脚本
            python3 scripts/daily_update_jiyou_gha.py \
              --html "jiyou-resonance.html" \
              --repo-dir "." \
              $DATE_ARG \
              $LOOKBACK_ARG \
              2>&1 | tee update_output.log

            # 检查是否有变更
            if ! grep -q "GHA_HAS_CHANGES=true" update_output.log; then
              echo "ℹ️  无数据变更，跳过提交"
              exit 0
            fi

            TARGET_DATE=$(grep "GHA_TARGET_DATE=" update_output.log | tail -1 | sed 's/GHA_TARGET_DATE=//')
            echo "📅 目标日期: $TARGET_DATE"

            # 提交
            git diff --name-only | while read f; do git add "$f"; done
            git commit -m "auto: $TARGET_DATE 机游共振日历每日更新 (GHA)"

            # 推送
            if git push origin calendar-pages; then
              echo "✅ 已推送到 calendar-pages 分支"
              exit 0
            else
              echo "⚠️  推送失败，可能有并发冲突，准备重试..."
              git reset --hard HEAD~1
              RETRY=$((RETRY+1))
              sleep $((RETRY * 10))
            fi
          done

          echo "❌ 重试 $MAX_RETRIES 次后仍然失败"
          exit 1
