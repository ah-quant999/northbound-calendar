name: 机游共振日历每日更新

# 触发方式：
#   - cron: 北京时间 17:35 每个工作日 = UTC 09:35 周一到周五
#   - workflow_dispatch: 手动触发
on:
  schedule:
    - cron: '35 9 * * 1-5'
  workflow_dispatch:
    inputs:
      date:
        description: '目标日期 (YYYY-MM-DD，留空为今天)'
        required: false
        default: ''
      lookback:
        description: '回刷前N个交易日'
        required: false
        default: '2'

permissions:
  contents: write

jobs:
  update-calendar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: calendar-pages

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Configure git
        run: |
          git config user.email "afoxli@coze.email"
          git config user.name "afoxli"

      - name: Run daily update
        id: update
        run: |
          DATE_ARG=""
          if [ -n "${{ github.event.inputs.date }}" ]; then
            DATE_ARG="--date ${{ github.event.inputs.date }}"
          fi
          LOOKBACK_ARG="--lookback 2"
          if [ -n "${{ github.event.inputs.lookback }}" ]; then
            LOOKBACK_ARG="--lookback ${{ github.event.inputs.lookback }}"
          fi

          python3 scripts/daily_update_jiyou_gha.py \
            --html "机游共振日历.html" \
            --repo-dir "." \
            $DATE_ARG \
            $LOOKBACK_ARG \
            2>&1 | tee update_output.log

          # 从输出中提取 GHA_HAS_CHANGES / GHA_NO_CHANGE
          if grep -q "GHA_HAS_CHANGES=true" update_output.log; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            TARGET_DATE=$(grep "GHA_TARGET_DATE=" update_output.log | tail -1 | sed 's/GHA_TARGET_DATE=//')
            echo "target_date=$TARGET_DATE" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.update.outputs.has_changes == 'true'
        run: |
          git add "机游共振日历.html" index.html
          git commit -m "auto: ${{ steps.update.outputs.target_date }} 机游共振日历每日更新 (GHA)"
          git push origin calendar-pages
          echo "✅ 已推送到 calendar-pages 分支"

      - name: No changes
        if: steps.update.outputs.has_changes == 'false'
        run: echo "ℹ️  无数据变更，跳过提交"
