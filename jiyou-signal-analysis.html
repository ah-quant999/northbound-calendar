<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>机游信号分析</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #0d1117;
            min-height: 100vh;
            padding: 20px;
            color: #c9d1d9;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: #161b22;
            border-radius: 12px;
            border: 1px solid #30363d;
            padding: 30px;
        }
        .header {
            text-align: center;
            padding: 15px 0 20px;
            border-bottom: 1px solid #30363d;
            margin-bottom: 25px;
        }
        .header h1 {
            font-size: 26px;
            font-weight: 600;
            color: #e8a0b0;
            margin-bottom: 6px;
        }
        .header .subtitle {
            color: #8b949e;
            font-size: 13px;
        }
        .breadcrumb {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 12px;
            font-size: 13px;
            color: #8b949e;
        }
        .breadcrumb a {
            color: #58a6ff;
            text-decoration: none;
        }
        .breadcrumb a:hover {
            text-decoration: underline;
        }
        .breadcrumb .current {
            color: #e8a0b0;
            font-weight: 600;
        }

        .date-nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 10px;
            font-size: 16px;
        }
        .date-nav .nav-btn {
            color: #e8a0b0;
            text-decoration: none;
            padding: 6px 16px;
            border: 1px solid #30363d;
            border-radius: 6px;
            transition: all 0.2s;
            font-size: 14px;
            cursor: pointer;
            background: #21262d;
        }
        .date-nav .nav-btn:hover {
            background: #30363d;
            border-color: #e8a0b0;
        }
        .date-nav .date-text {
            font-weight: 600;
            font-size: 20px;
            color: #f0f6fc;
            min-width: 160px;
            text-align: center;
        }
        .update-time {
            text-align: center;
            color: #6e7681;
            font-size: 12px;
            margin-bottom: 25px;
        }

        .section {
            margin-bottom: 30px;
        }
        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #f0f6fc;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 四卡片布局 */
        .signal-cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }
        .signal-card {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 14px 16px;
        }
        .signal-card-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .signal-card-count {
            font-size: 12px;
            font-weight: normal;
            background: rgba(232, 160, 176, 0.15);
            color: #e8a0b0;
            padding: 2px 8px;
            border-radius: 10px;
        }
        .stock-list {
            max-height: 300px;
            overflow-y: auto;
        }
        .stock-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid #21262d;
            font-size: 13px;
        }
        .stock-item:last-child {
            border-bottom: none;
        }
        .stock-name {
            color: #c9d1d9;
            font-weight: 500;
            flex-shrink: 0;
        }
        .stock-code {
            color: #6e7681;
            font-size: 11px;
            margin-left: 4px;
            font-weight: normal;
        }
        .stock-meta {
            text-align: right;
            line-height: 1.4;
        }
        .stock-meta .row1 {
            font-size: 12px;
            color: #8b949e;
        }
        .stock-meta .row2 {
            font-size: 11px;
            color: #6e7681;
        }
        .up { color: #f85149; }
        .down { color: #3fb950; }
        .empty {
            color: #6e7681;
            font-size: 13px;
            padding: 10px 0;
            text-align: center;
        }

        /* 行业板块 */
        .industry-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }
        .industry-box {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 14px 16px;
        }
        .industry-box-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
            color: #58a6ff;
        }
        .industry-item {
            display: flex;
            align-items: center;
            padding: 5px 0;
            font-size: 13px;
            border-bottom: 1px solid #21262d;
        }
        .industry-item:last-child { border-bottom: none; }
        .industry-name {
            width: 110px;
            flex-shrink: 0;
            color: #c9d1d9;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .industry-bar {
            flex: 1;
            height: 18px;
            background: #21262d;
            border-radius: 3px;
            margin: 0 8px;
            position: relative;
            overflow: hidden;
        }
        .industry-bar-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.3s;
        }
        .industry-bar-fill.buy { background: linear-gradient(90deg, #f85149, #da3633); }
        .industry-bar-fill.sell { background: linear-gradient(90deg, #238636, #2ea043); }
        .industry-bar-fill.youzi-buy { background: linear-gradient(90deg, #d29922, #bf8700); }
        .industry-amount {
            width: 80px;
            text-align: right;
            flex-shrink: 0;
            font-size: 12px;
        }

        /* 知名游资 */
        .youzi-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .youzi-card {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 12px 14px;
        }
        .youzi-card-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .youzi-name-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }
        .youzi-stock {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 0;
            font-size: 12px;
            border-bottom: 1px solid #21262d;
        }
        .youzi-stock:last-child { border-bottom: none; }
        .youzi-stock-name {
            color: #c9d1d9;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex-shrink: 0;
            max-width: 150px;
        }
        .youzi-stock-net {
            font-weight: 500;
        }

        /* 细分信号 */
        .sub-signal-section {
            margin-bottom: 18px;
        }
        .sub-signal-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .sub-signal-title .badge {
            font-size: 11px;
            font-weight: normal;
            background: rgba(163, 113, 247, 0.15);
            color: #a371f7;
            padding: 2px 8px;
            border-radius: 10px;
        }
        .sub-signal-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .sub-stock-item {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 8px 10px;
            font-size: 12px;
        }
        .sub-stock-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }
        .sub-stock-name {
            font-weight: 600;
            color: #c9d1d9;
        }
        .sub-stock-reason {
            color: #8b949e;
            font-size: 11px;
            line-height: 1.4;
        }
        .sub-stock-meta {
            display: flex;
            gap: 8px;
            margin-top: 4px;
            flex-wrap: wrap;
        }
        .sub-stock-meta span {
            font-size: 11px;
            color: #6e7681;
        }

        /* 滚动条 */
        .stock-list::-webkit-scrollbar {
            width: 6px;
        }
        .stock-list::-webkit-scrollbar-track {
            background: #161b22;
        }
        .stock-list::-webkit-scrollbar-thumb {
            background: #30363d;
            border-radius: 3px;
        }

        /* Tab 导航 */
        .tab-nav {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            border-bottom: 1px solid #30363d;
            padding-bottom: 0;
        }
        .tab-btn {
            background: transparent;
            border: none;
            color: #8b949e;
            padding: 12px 20px;
            font-size: 15px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            transition: all 0.2s;
            font-family: inherit;
        }
        .tab-btn:hover {
            color: #c9d1d9;
        }
        .tab-btn.active {
            color: #e8a0b0;
            border-bottom-color: #e8a0b0;
            font-weight: 600;
        }
        .tab-btn.tab-link {
            color: #58a6ff;
            text-decoration: none;
            font-size: 13px;
            padding: 6px 14px;
            border: 1px solid #30363d;
            border-radius: 6px;
            border-bottom: 1px solid #30363d;
            margin-bottom: 8px;
        }
        .tab-btn.tab-link:hover {
            background: #21262d;
            text-decoration: none;
        }
        .tab-pane {
            display: none;
        }
        .tab-pane.active {
            display: block;
        }

        /* 周期切换 */
        .period-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }
        .period-label {
            font-size: 13px;
            color: #8b949e;
        }
        .period-btn {
            background: #21262d;
            border: 1px solid #30363d;
            color: #8b949e;
            padding: 5px 14px;
            font-size: 13px;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
            font-family: inherit;
        }
        .period-btn:hover {
            background: #30363d;
            color: #c9d1d9;
        }
        .period-btn.active {
            background: rgba(232, 160, 176, 0.15);
            border-color: #e8a0b0;
            color: #e8a0b0;
            font-weight: 500;
        }

        .section-sub {
            font-size: 12px;
            font-weight: normal;
            color: #6e7681;
            margin-left: 8px;
        }

        /* 排名表格 */
        .rank-table-wrap {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            overflow: hidden;
        }
        .rank-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .rank-table th {
            background: #161b22;
            color: #8b949e;
            font-weight: 500;
            font-size: 12px;
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid #30363d;
        }
        .rank-table td {
            padding: 10px 12px;
            border-bottom: 1px solid #21262d;
            color: #c9d1d9;
        }
        .rank-table tr:last-child td {
            border-bottom: none;
        }
        .rank-table tr:hover td {
            background: #161b22;
        }
        .rank-num {
            display: inline-block;
            width: 24px;
            height: 24px;
            line-height: 24px;
            text-align: center;
            border-radius: 50%;
            background: #21262d;
            color: #8b949e;
            font-size: 12px;
            font-weight: 600;
        }
        .rank-num.top1 { background: linear-gradient(135deg, #f0b429, #d4a017); color: #0d1117; }
        .rank-num.top2 { background: linear-gradient(135deg, #a0aec0, #718096); color: #0d1117; }
        .rank-num.top3 { background: linear-gradient(135deg, #c05621, #9c4221); color: #0d1117; }

        /* 热度指数 */
        .heat-index-wrap {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 20px;
        }
        .heat-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 20px;
        }
        .heat-stat-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 16px;
            text-align: center;
        }
        .heat-stat-label {
            font-size: 12px;
            color: #8b949e;
            margin-bottom: 8px;
        }
        .heat-stat-value {
            font-size: 22px;
            font-weight: 600;
            color: #f0f6fc;
        }
        .heat-stat-value.up { color: #f85149; }
        .heat-stat-value.down { color: #3fb950; }
        .heat-daily-list {
            max-height: 280px;
            overflow-y: auto;
        }
        .heat-daily-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #21262d;
            font-size: 13px;
        }
        .heat-daily-item:last-child {
            border-bottom: none;
        }
        .heat-daily-date {
            color: #8b949e;
            width: 90px;
            flex-shrink: 0;
        }
        .heat-daily-metrics {
            display: flex;
            gap: 20px;
            flex: 1;
            justify-content: flex-end;
        }
        .heat-daily-metrics span {
            font-size: 12px;
            min-width: 80px;
            text-align: right;
        }

        @media (max-width: 768px) {
            .signal-cards, .industry-grid, .youzi-grid, .sub-signal-list {
                grid-template-columns: 1fr;
            }
            .container {
                padding: 15px;
            }
            body {
                padding: 10px;
            }
            .sub-signal-list {
                grid-template-columns: 1fr;
            }
            .heat-stats {
                grid-template-columns: 1fr;
            }
            .rank-table th, .rank-table td {
                padding: 8px 10px;
                font-size: 12px;
            }
            .tab-btn {
                padding: 10px 14px;
                font-size: 14px;
            }
        }
    </style>
</head>

    function fmtAmount(wan) {
        if (wan === undefined || wan === null) return '--';
        var abs = Math.abs(wan);
        if (abs >= 10000) return (wan / 10000).toFixed(2) + '亿';
        return wan.toFixed(0) + '万';
    }

    function fmtPct(pct) {
        if (pct === undefined || pct === null) return '--';
        var s = pct.toFixed(2);
        if (pct > 0) return '+' + s + '%';
        return s + '%';
    }

    function pctClass(pct) {
        if (pct > 0) return 'up';
        if (pct < 0) return 'down';
        return '';
    }

    function renderIndustry(data) {
        var container = document.getElementById('industry-grid');
        var ind = data.industry || {};
        var instTop = ind.inst_top10 || [];
        var youziTop = ind.youzi_top10 || [];

        var maxInst = 0;
        for (var i = 0; i < instTop.length; i++) {
            var abs = Math.abs(instTop[i].net_buy_wan);
            if (abs > maxInst) maxInst = abs;
        }
        var maxYouzi = 0;
        for (var i = 0; i < youziTop.length; i++) {
            var abs = Math.abs(youziTop[i].net_buy_wan);
            if (abs > maxYouzi) maxYouzi = abs;
        }

        var html = '';
        // 机构
        html += '<div class="industry-box">';
        html += '<div class="industry-box-title">🏢 机构净买TOP行业</div>';
        if (!ind.has_industry_data) {
            html += '<div class="empty">行业数据接口接入中...</div>';
        } else if (instTop.length === 0) {
            html += '<div class="empty">暂无数据</div>';
        } else {
            for (var i = 0; i < instTop.length; i++) {
                var it = instTop[i];
                var pct = maxInst > 0 ? (Math.abs(it.net_buy_wan) / maxInst * 100) : 0;
                var cls = it.net_buy_wan > 0 ? 'buy' : 'sell';
                var amtCls = it.net_buy_wan > 0 ? 'up' : 'down';
                var sign = it.net_buy_wan > 0 ? '+' : '';
                html += '<div class="industry-item">';
                html += '<div class="industry-name" title="' + it.industry + '">' + it.industry + '</div>';

                html += '<div class="industry-amount ' + amtCls + '">' + sign + fmtAmount(it.net_buy_wan) + '</div>';

        html += '</div>';

        // 游资
        html += '<div class="industry-box">';
        html += '<div class="industry-box-title">⚡ 游资净买TOP行业</div>';
        if (!ind.has_industry_data) {
            html += '<div class="empty">行业数据接口接入中...</div>';
        } else if (youziTop.length === 0) {
            html += '<div class="empty">暂无数据</div>';
        } else {
            for (var i = 0; i < youziTop.length; i++) {
                var it = youziTop[i];
                var pct = maxYouzi > 0 ? (Math.abs(it.net_buy_wan) / maxYouzi * 100) : 0;
                var cls = it.net_buy_wan > 0 ? 'youzi-buy' : 'sell';
                var amtCls = it.net_buy_wan > 0 ? 'up' : 'down';
                var sign = it.net_buy_wan > 0 ? '+' : '';

                html += '<div class="industry-name" title="' + it.industry + '">' + it.industry + '</div>';

                html += '</div>';
            }

        html += '</div>';

        var maxYouzi = 0;
        for (var i = 0; i < youziTop.length; i++) {
            var abs = Math.abs(youziTop[i].net_buy_wan);
            if (abs > maxYouzi) maxYouzi = abs;
        }

        var html = '';
        // 机构
        html += '<div class="industry-box">';
        html += '<div class="industry-box-title">🏢 机构净买TOP行业</div>';
        if (!ind.has_industry_data) {
            html += '<div class="empty">行业数据接口接入中...</div>';
        } else if (instTop.length === 0) {
            html += '<div class="empty">暂无数据</div>';
        } else {
            for (var i = 0; i < instTop.length; i++) {
                var it = instTop[i];
                var pct = maxInst > 0 ? (Math.abs(it.net_buy_wan) / maxInst * 100) : 0;
                var cls = it.net_buy_wan > 0 ? 'buy' : 'sell';
                var amtCls = it.net_buy_wan > 0 ? 'up' : 'down';
                var sign = it.net_buy_wan > 0 ? '+' : '';
                html += '<div class="industry-item">';
                html += '<div class="industry-name" title="' + it.industry + '">' + it.industry + '</div>';
                html += '<div class="industry-bar"><div class="industry-bar-fill ' + cls + '" style="width:' + pct + '%;"></div></div>';
                html += '<div class="industry-amount ' + amtCls + '">' + sign + fmtAmount(it.net_buy_wan) + '</div>';
                html += '</div>';
            }
        }
        html += '</div>';
        // 游资
        html += '<div class="industry-box">';
        html += '<div class="industry-box-title">⚡ 游资净买TOP行业</div>';
        if (!ind.has_industry_data) {
            html += '<div class="empty">行业数据接口接入中...</div>';
        } else if (youziTop.length === 0) {
            html += '<div class="empty">暂无数据</div>';
        } else {
            for (var i = 0; i < youziTop.length; i++) {
                var it = youziTop[i];
                var pct = maxYouzi > 0 ? (Math.abs(it.net_buy_wan) / maxYouzi * 100) : 0;
                var cls = it.net_buy_wan > 0 ? 'youzi-buy' : 'sell';
                var amtCls = it.net_buy_wan > 0 ? 'up' : 'down';
                var sign = it.net_buy_wan > 0 ? '+' : '';
                html += '<div class="industry-item">';
                html += '<div class="industry-name" title="' + it.industry + '">' + it.industry + '</div>';
                html += '<div class="industry-bar"><div class="industry-bar-fill ' + cls + '" style="width:' + pct + '%;"></div></div>';
                html += '<div class="industry-amount ' + amtCls + '">' + sign + fmtAmount(it.net_buy_wan) + '</div>';
                html += '</div>';
            }
        }
        html += '</div>';
        container.innerHTML = html;
    }

    function getRankNumClass(i) {
        if (i === 0) return 'top1';
        if (i === 1) return 'top2';
        if (i === 2) return 'top3';
        return '';
    }

    function renderCTInstContinuous(ct) {
        var container = document.getElementById('ct-inst-continuous');
        var list = ct.inst_continuous || [];
        if (list.length === 0) {
            container.innerHTML = '<div class="empty" style="padding:30px;text-align:center;">暂无连续加仓个股</div>';
            return;
        }
        var html = '<table class="rank-table"><thead><tr>';
        html += '<th style="width:50px;">排名</th><th>股票名称</th>';
        html += '<th style="width:100px;">连续天数</th><th style="width:120px;">累计净买</th>';
        html += '</tr></thead><tbody>';
        for (var i = 0; i < list.length; i++) {
            var s = list[i];
            html += '<tr>';
            html += '<td><span class="rank-num ' + getRankNumClass(i) + '">' + (i + 1) + '</span></td>';
            html += '<td>' + s.name + '<span class="stock-code">' + s.code + '</span></td>';
            html += '<td style="color:#e8a0b0;font-weight:600;">' + s.streak_days + ' 天</td>';
            html += '<td class="up">' + fmtAmount(s.total_net_wan) + '</td>';
            html += '</tr>';
        }
        html += '</tbody></table>';
        container.innerHTML = html;
    }

    function renderCTYouziRelay(ct) {
        var container = document.getElementById('ct-youzi-relay');
        var list = ct.youzi_relay || [];
        if (list.length === 0) {
            container.innerHTML = '<div class="empty" style="padding:30px;text-align:center;">暂无游资接力个股</div>';
            return;
        }
        var html = '<table class="rank-table"><thead><tr>';
        html += '<th style="width:50px;">排名</th><th>股票名称</th>';
        html += '<th style="width:90px;">接力天数</th><th style="width:90px;">游资参与</th>';
        html += '<th style="width:120px;">游资累计净买</th>';
        html += '</tr></thead><tbody>';
        for (var i = 0; i < list.length; i++) {
            var s = list[i];
            html += '<tr>';
            html += '<td><span class="rank-num ' + getRankNumClass(i) + '">' + (i + 1) + '</span></td>';
            html += '<td>' + s.name + '<span class="stock-code">' + s.code + '</span></td>';
            html += '<td style="color:#d29922;font-weight:600;">' + s.relay_days + ' 天</td>';
            html += '<td>' + s.youzi_count + ' 位</td>';
            html += '<td class="up">' + fmtAmount(s.total_net_wan) + '</td>';
            html += '</tr>';
        }
        html += '</tbody></table>';
        container.innerHTML = html;
    }

    function renderCTHighFreq(ct) {
        var container = document.getElementById('ct-high-freq');
        var list = (ct.high_freq && ct.high_freq[currentPeriod]) ? ct.high_freq[currentPeriod] : [];
        if (list.length === 0) {
            container.innerHTML = '<div class="empty" style="padding:30px;text-align:center;">暂无数据</div>';
            return;
        }
        var html = '<table class="rank-table"><thead><tr>';
        html += '<th style="width:50px;">排名</th><th>股票名称</th>';
        html += '<th style="width:100px;">上榜次数</th><th style="width:100px;">上涨天数</th>';
        html += '<th style="width:100px;">上涨占比</th>';
        html += '</tr></thead><tbody>';
        for (var i = 0; i < list.length; i++) {
            var s = list[i];
            var ratio = s.count > 0 ? (s.up_days / s.count * 100).toFixed(1) : '0.0';
            html += '<tr>';
            html += '<td><span class="rank-num ' + getRankNumClass(i) + '">' + (i + 1) + '</span></td>';
            html += '<td>' + s.name + '<span class="stock-code">' + s.code + '</span></td>';
            html += '<td style="font-weight:600;">' + s.count + ' 次</td>';
            html += '<td class="up">' + s.up_days + ' 天</td>';
            html += '<td>' + ratio + '%</td>';
            html += '</tr>';
        }
        html += '</tbody></table>';
        container.innerHTML = html;
    }

    function renderCTHeatIndex(ct) {
        var container = document.getElementById('ct-heat-index');
        var heat = ct.heat_index || {};
        var avg = heat[currentPeriod + '_avg'] || {};
        var daily = heat.daily || [];
        // 取对应周期的数据
        var days = currentPeriod === 'week' ? 7 : 30;
        var periodDaily = daily.slice(-Math.min(days, daily.length));
        periodDaily.reverse();  // 最新在上面

        var html = '';
        html += '<div class="heat-stats">';
        html += '<div class="heat-stat-card">';
        html += '<div class="heat-stat-label">日均上榜股票数</div>';
        html += '<div class="heat-stat-value">' + (avg.avg_stocks || 0) + ' 只</div>';
        html += '</div>';
        html += '<div class="heat-stat-card">';
        html += '<div class="heat-stat-label">日均机构净买卖</div>';
        var instNet = avg.avg_inst_net_wan || 0;
        var instCls = instNet > 0 ? 'up' : 'down';
        var instSign = instNet > 0 ? '+' : '';
        html += '<div class="heat-stat-value ' + instCls + '">' + instSign + fmtAmount(instNet) + '</div>';
        html += '</div>';
        html += '<div class="heat-stat-card">';
        html += '<div class="heat-stat-label">日均游资净买卖</div>';
        var youziNet = avg.avg_youzi_net_wan || 0;
        var youziCls = youziNet > 0 ? 'up' : 'down';
        var youziSign = youziNet > 0 ? '+' : '';
        html += '<div class="heat-stat-value ' + youziCls + '">' + youziSign + fmtAmount(youziNet) + '</div>';
        html += '</div>';
        html += '</div>';

        html += '<div style="font-size:13px;color:#8b949e;margin-bottom:10px;font-weight:500;">每日明细（最新在前）</div>';
        html += '<div class="heat-daily-list">';
        if (periodDaily.length === 0) {
            html += '<div class="empty">暂无数据</div>';
        } else {
            for (var i = 0; i < periodDaily.length; i++) {
                var d = periodDaily[i];
                var instN = d.inst_total_net_wan || 0;
                var yzN = d.youzi_total_net_wan || 0;
                html += '<div class="heat-daily-item">';
                html += '<div class="heat-daily-date">' + d.date + '</div>';
                html += '<div class="heat-daily-metrics">';
                html += '<span style="color:#c9d1d9;">上榜 ' + d.stock_count + ' 只</span>';
                html += '<span class="' + (instN > 0 ? 'up' : 'down') + '">机构 ' + (instN > 0 ? '+' : '') + fmtAmount(instN) + '</span>';
                html += '<span class="' + (yzN > 0 ? 'up' : 'down') + '">游资 ' + (yzN > 0 ? '+' : '') + fmtAmount(yzN) + '</span>';
                html += '</div></div>';
            }
        }
        html += '</div>';
        container.innerHTML = html;
    }

    // ========== 渲染主函数 ==========
    function renderPage(dateStr) {
        var data = signalData[dateStr];
        if (!data) {
            document.getElementById('current-date').textContent = dateStr;
            document.getElementById('update-time').textContent = '暂无数据';
            document.getElementById('signal-cards').innerHTML = '<div class="empty" style="grid-column:1/-1;padding:40px;">该日期暂无信号数据</div>';
            document.getElementById('industry-grid').innerHTML = '';
            document.getElementById('youzi-grid').innerHTML = '';
            document.getElementById('sub-signals').innerHTML = '';
            return;
        }
        document.getElementById('current-date').textContent = dateStr;
        document.getElementById('update-time').textContent = '更新于 ' + (data.update_time || '--');
        renderSignalCards(data);
        renderIndustry(data);
        renderFamousYouzi(data);
        renderSubSignals(data);
    }

    // ========== 翻页 ==========
    function getCurrentDateIndex() {
        var cur = document.getElementById('current-date').textContent;
        for (var i = 0; i < availableDates.length; i++) {
            if (availableDates[i] === cur) return i;
        }
        return -1;
    }
    function prevDay() {
        var idx = getCurrentDateIndex();
        if (idx < 0) idx = availableDates.length;
        if (idx > 0) {
            renderPage(availableDates[idx - 1]);
            window.scrollTo(0, 0);
        }
    }
    function nextDay() {
        var idx = getCurrentDateIndex();
        if (idx < 0) idx = -1;
        if (idx < availableDates.length - 1) {
            renderPage(availableDates[idx + 1]);
            window.scrollTo(0, 0);
        }
    }

    // ========== 初始化 ==========
    function init() {
        var dates = Object.keys(signalData).sort();
        availableDates = dates;
        if (dates.length > 0) {
            // 显示最新一天
            var latest = dates[dates.length - 1];
            // 如果URL有date参数，优先使用
            var params = new URLSearchParams(window.location.search);
            var reqDate = params.get('date');
            if (reqDate && signalData[reqDate]) {
                latest = reqDate;
            }
            renderPage(latest);
        } else {
            document.getElementById('current-date').textContent = '--';
            document.getElementById('update-time').textContent = '暂无数据';
        }
    }
    init();
    </script>
